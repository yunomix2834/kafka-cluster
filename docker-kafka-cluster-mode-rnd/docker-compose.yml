version: "3.9"

services:
  kafka:
    image: ${IMAGE:-registry2.cloud.cmctelecom.vn/rnd_db/kafka:3.7}
    container_name: ${CONTAINER_NAME:-kafka}
    user: "1001"
    restart: unless-stopped
    mem_limit: "3500m"

    ulimits:
      nofile:
        soft: 100000
        hard: 100000

    ports:
      - "7071:7071"
      - "9092:9092"
      - "9093:9093"

    volumes:
      - ${DATA_DIR:-/var/lib/kafka/data}:/bitnami/kafka/data:rw
      - /opt/guest-agent/etc/kafka_client.conf:/etc/kafka_client.conf:rw
      - /etc/kafka/config/kafka_jaas.conf:/opt/bitnami/kafka/config/kafka_jaas.conf:rw

    environment:
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_BROKER_ID: "${NODE_ID}"
      KAFKA_CFG_NODE_ID: "${NODE_ID}"
      KAFKA_KRAFT_CLUSTER_ID: "3dd86896-6318-403a-ac1c-bb34036ac82f"

      KAFKA_CFG_LISTENERS: "CONTROLLER://:9093,SASL_PLAINTEXT://:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,SASL_PLAINTEXT:SASL_PLAINTEXT"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@10.60.68.211:9093,1@10.60.68.242:9093,2@10.60.68.32:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "SASL_PLAINTEXT://${HOST_IP}:9092"

      KAFKA_CFG_SECURITY_INTER_BROKER_PROTOCOL: "SASL_PLAINTEXT"
      KAFKA_CFG_SASL_ENABLED_MECHANISMS: "PLAIN"
      KAFKA_CFG_SASL_MECHANISM_INTER_BROKER_PROTOCOL: "PLAIN"
      KAFKA_CFG_SUPER_USERS: "User:admin"
      KAFKA_OPTS: "-Djava.security.auth.login.config=/opt/bitnami/kafka/config/kafka_jaas.conf"

      JMX_PORT: "2020"

      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: "3"
      KAFKA_CFG_MIN_INSYNC_REPLICAS: "2"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: "3"
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "3"
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: "2"